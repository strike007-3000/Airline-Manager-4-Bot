name: Playwright Tests
on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"
    - cron: "0 0,2,4,6,8 * * *"
    - cron: "0 11,14,17,20 * * *"
permissions:
  contents: read
jobs:
  test:
    if: ${{ github.event_name != 'schedule' || github.event.schedule != '0 11,14,17,20 * * *' || github.run_started_at < '2026-04-06T00:00:00Z' }}
    timeout-minutes: 10
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
    - uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
    - uses: actions/setup-node@v6
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
    - name: Run Playwright tests
      run: npx playwright test
      env:
        EMAIL: ${{ secrets.EMAIL }}
        PASSWORD: ${{ secrets.PASSWORD }}
        MAX_FUEL_PRICE: ${{ vars.MAX_FUEL_PRICE }}
        MAX_CO2_PRICE: ${{ vars.MAX_CO2_PRICE }}
        INCREASE_AIRLINE_REPUTATION: ${{ vars.INCREASE_AIRLINE_REPUTATION }}
        CAMPAIGN_TYPE: ${{ vars.CAMPAIGN_TYPE }}
        CAMPAIGN_DURATION: ${{ vars.CAMPAIGN_DURATION }}
        MARKETING_MODE: ${{ vars.MARKETING_MODE }}
        MARKETING_BUDGET: ${{ vars.MARKETING_BUDGET }}
        GAME_MODE: ${{ vars.GAME_MODE }}
        MINIMUM_FUEL_COVER_HOURS: ${{ vars.MINIMUM_FUEL_COVER_HOURS }}
        MINIMUM_CO2_COVER_HOURS: ${{ vars.MINIMUM_CO2_COVER_HOURS }}
        AVERAGE_FUEL_BURN_PER_DEPARTURE: ${{ vars.AVERAGE_FUEL_BURN_PER_DEPARTURE }}
        AVERAGE_CO2_BURN_PER_DEPARTURE: ${{ vars.AVERAGE_CO2_BURN_PER_DEPARTURE }}
        MARKET_HISTORY_FILE: ${{ vars.MARKET_HISTORY_FILE }}
        MAX_PRICE_UPDATES_PER_RUN: ${{ vars.MAX_PRICE_UPDATES_PER_RUN }}
        ENABLE_PRICING: ${{ vars.ENABLE_PRICING || 'false' }}
        EASY_MODE_ECONOMY_MULTIPLIER_PERCENT: ${{ vars.EASY_MODE_ECONOMY_MULTIPLIER_PERCENT }}
        EASY_MODE_BUSINESS_MULTIPLIER_PERCENT: ${{ vars.EASY_MODE_BUSINESS_MULTIPLIER_PERCENT }}
        EASY_MODE_FIRST_MULTIPLIER_PERCENT: ${{ vars.EASY_MODE_FIRST_MULTIPLIER_PERCENT }}
        EASY_MODE_CARGO_LARGE_MULTIPLIER_PERCENT: ${{ vars.EASY_MODE_CARGO_LARGE_MULTIPLIER_PERCENT }}
        EASY_MODE_CARGO_HEAVY_MULTIPLIER_PERCENT: ${{ vars.EASY_MODE_CARGO_HEAVY_MULTIPLIER_PERCENT }}
